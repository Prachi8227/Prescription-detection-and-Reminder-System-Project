{% extends 'layout.html' %}
{% block content %}
<h2>Edit Reminder</h2>

<form method="POST" action="{{ url_for('edit_reminder', reminder_id=reminder[0]) }}">
    <div class="form-group">
        <label for="medication">Medication:</label>
        <input type="text" id="medication" name="medication" class="form-control" value="{{ reminder[1] }}" required>
    </div>
    <div class="form-group">
        <label for="dosage">Dosage (e.g., "500mg", "1 tablet"):</label>
        <input type="text" id="dosage" name="dosage" class="form-control" value="{{ reminder[2] if reminder[2] else '' }}">
    </div>
    <div class="form-group">
        <label for="frequency">Frequency (e.g., "once daily", "every 8 hours"):</label>
        <input type="text" id="frequency" name="frequency" class="form-control" value="{{ reminder[3] }}" required>
    </div>
    <div class="form-group">
        <label for="start_date">Start Date:</label>
        <input type="date" id="start_date" name="start_date" class="form-control" value="{{ reminder[4] }}" required>
    </div>
    <div class="form-group">
        <label for="end_date">End Date (optional):</label>
        <input type="date" id="end_date" name="end_date" class="form-control" value="{{ reminder[5] if reminder[5] else '' }}">
    </div>
    <div class="form-group">
        <label for="time_of_day">Time of Day (e.g., "Morning", "10:00 AM"):</label>
        <input type="text" id="time_of_day" name="time_of_day" class="form-control" value="{{ reminder[6] if reminder[6] else '' }}">
    </div>
    <button type="submit" class="glass-button">Update Reminder</button>
</form>

<p><a href="{{ url_for('reminders') }}" class="glass-button">Back to Reminders</a></p>
{% endblock %}
