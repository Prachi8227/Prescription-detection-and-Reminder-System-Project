{% extends 'layout.html' %}
{% block title %}Edit User{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-center">
                    <h2>Edit User</h2>
                </div>
                <div class="card-body">
                    {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                    <div class="alert-container">
                        {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                        {% endfor %}
                    </div>
                    {% endif %}
                    {% endwith %}
                    <form method="POST">
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" class="form-control" id="username" name="username" value="{{ user[1] }}" required>
                        </div>
                        <div class="form-group">
                            <label for="password">New Password (leave blank to keep current)</label>
                            <input type="password" class="form-control" id="password" name="password">
                        </div>
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" class="form-control" id="address" name="address" value="{{ user[3] }}" required>
                        </div>
                        <div class="form-group">
                            <label for="mobile_no">Mobile Number</label>
                            <input type="text" class="form-control" id="mobile_no" name="mobile_no" value="{{ user[4] }}" required>
                        </div>
                        <div class="form-group">
                            <label for="blood_group">Blood Group</label>
                            <input type="text" class="form-control" id="blood_group" name="blood_group" value="{{ user[5] }}" required>
                        </div>
                        <div class="form-group">
                            <label for="pin_code">Pin Code</label>
                            <input type="text" class="form-control" id="pin_code" name="pin_code" value="{{ user[6] }}" required>
                        </div>
                        <div class="form-group">
                            <label for="email_id">Email ID</label>
                            <input type="email" class="form-control" id="email_id" name="email_id" value="{{ user[7] }}" required>
                        </div>
                        <div class="form-group">
                            <label for="gender">Gender</label>
                            <select class="form-control" id="gender" name="gender" required>
                                <option value="Male" {% if user[8] == 'Male' %}selected{% endif %}>Male</option>
                                <option value="Female" {% if user[8] == 'Female' %}selected{% endif %}>Female</option>
                                <option value="Other" {% if user[8] == 'Other' %}selected{% endif %}>Other</option>
                            </select>
                        </div>
                        <div class="form-group form-check">
                            <input type="checkbox" class="form-check-input" id="is_admin" name="is_admin" {% if user[2] == 1 %}checked{% endif %}>
                            <label class="form-check-label" for="is_admin">Is Admin</label>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Update User</button>
                        <a href="{{ url_for('admin') }}" class="btn btn-secondary btn-block mt-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
